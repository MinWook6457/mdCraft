<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MDCRAFT — 마크다운 에디터</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+KR:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #0a0a0f;
    --bg-editor: #0f0f18;
    --bg-preview: #faf9f7;
    --bg-toolbar: #12121e;
    --border: #1e1e30;
    --accent: #6c5ce7;
    --accent-glow: rgba(108, 92, 231, 0.3);
    --accent-hover: #7c6df7;
    --text-editor: #c8c8d8;
    --text-preview: #1a1a2e;
    --text-muted: #555577;
    --line-num: #2a2a44;
    --cursor: #6c5ce7;
    --scrollbar-thumb: #2a2a44;
    --green: #00d2a0;
    --orange: #ff9f43;
    --pink: #fd79a8;
    --blue: #0984e3;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg-deep);
    color: var(--text-editor);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ─── HEADER ─── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    background: var(--bg-deep);
    border-bottom: 1px solid var(--border);
    z-index: 100;
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 32px;
    height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--pink));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 14px;
    color: #fff;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: -1px;
  }

  .logo-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    font-weight: 600;
    color: #fff;
    letter-spacing: 2px;
  }

  .logo-text span {
    color: var(--accent);
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .header-btn {
    background: var(--bg-toolbar);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 7px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .header-btn:hover {
    color: #fff;
    border-color: var(--accent);
    background: rgba(108, 92, 231, 0.1);
  }

  .header-btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .header-btn.primary:hover {
    background: var(--accent-hover);
  }

  .spin-icon {
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* ─── TOOLBAR ─── */
  .toolbar {
    display: flex;
    align-items: center;
    padding: 8px 24px;
    background: var(--bg-toolbar);
    border-bottom: 1px solid var(--border);
    gap: 4px;
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  .toolbar-group {
    display: flex;
    align-items: center;
    gap: 2px;
  }

  .toolbar-divider {
    width: 1px;
    height: 20px;
    background: var(--border);
    margin: 0 8px;
  }

  .tool-btn {
    width: 32px;
    height: 32px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    transition: all 0.15s;
    position: relative;
  }

  .tool-btn:hover {
    background: rgba(108, 92, 231, 0.15);
    color: var(--accent);
  }

  .tool-btn:active {
    transform: scale(0.92);
  }

  .tool-btn svg {
    width: 16px;
    height: 16px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* ─── MAIN LAYOUT ─── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  /* ─── EDITOR PANEL ─── */
  .editor-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--bg-editor);
    min-width: 0;
    position: relative;
  }

  .panel-label {
    position: absolute;
    top: 12px;
    right: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    opacity: 0.5;
    z-index: 5;
    pointer-events: none;
  }

  .editor-wrapper {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  #editor {
    width: 100%;
    height: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text-editor);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    line-height: 1.75;
    padding: 20px 24px;
    resize: none;
    tab-size: 2;
    caret-color: var(--cursor);
    overflow-y: auto;
  }

  #editor::placeholder {
    color: var(--text-muted);
    opacity: 0.4;
  }

  #editor::-webkit-scrollbar {
    width: 6px;
  }
  #editor::-webkit-scrollbar-track {
    background: transparent;
  }
  #editor::-webkit-scrollbar-thumb {
    background: var(--scrollbar-thumb);
    border-radius: 3px;
  }

  /* ─── RESIZE HANDLE ─── */
  .resize-handle {
    width: 5px;
    cursor: col-resize;
    background: var(--border);
    transition: background 0.2s;
    position: relative;
    flex-shrink: 0;
  }

  .resize-handle::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 3px;
    height: 40px;
    background: var(--text-muted);
    border-radius: 2px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .resize-handle:hover {
    background: var(--accent);
  }

  .resize-handle:hover::after {
    opacity: 0.5;
  }

  /* ─── PREVIEW PANEL ─── */
  .preview-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--bg-preview);
    min-width: 0;
    position: relative;
  }

  .preview-content {
    flex: 1;
    overflow-y: auto;
    padding: 32px 40px;
    scroll-behavior: smooth;
  }

  .preview-content::-webkit-scrollbar {
    width: 6px;
  }
  .preview-content::-webkit-scrollbar-track {
    background: transparent;
  }
  .preview-content::-webkit-scrollbar-thumb {
    background: #d0cfc8;
    border-radius: 3px;
  }

  /* ─── MARKDOWN RENDERED STYLES ─── */
  .markdown-body {
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text-preview);
    line-height: 1.8;
    font-size: 15px;
    max-width: 100%;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .markdown-body h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.4em;
    font-weight: 700;
    color: #0f0f1a;
    margin: 1.2em 0 0.6em;
    padding-bottom: 0.3em;
    border-bottom: 3px solid var(--accent);
    letter-spacing: -0.5px;
    line-height: 1.3;
  }

  .markdown-body h1:first-child { margin-top: 0; }

  .markdown-body h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.8em;
    font-weight: 700;
    color: #1a1a2e;
    margin: 1.4em 0 0.5em;
    padding-bottom: 0.2em;
    border-bottom: 1px solid #e0ddd6;
    line-height: 1.35;
  }

  .markdown-body h3 {
    font-size: 1.3em;
    font-weight: 700;
    color: #2a2a40;
    margin: 1.2em 0 0.4em;
  }

  .markdown-body h4, .markdown-body h5, .markdown-body h6 {
    font-size: 1.1em;
    font-weight: 600;
    color: #3a3a55;
    margin: 1em 0 0.3em;
  }

  .markdown-body p {
    margin: 0.8em 0;
    word-break: keep-all;
  }

  .markdown-body a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s;
  }

  .markdown-body a:hover {
    border-bottom-color: var(--accent);
  }

  .markdown-body strong {
    font-weight: 700;
    color: #0f0f1a;
  }

  .markdown-body em {
    font-style: italic;
    color: #3a3a55;
  }

  .markdown-body blockquote {
    margin: 1em 0;
    padding: 12px 20px;
    border-left: 4px solid var(--accent);
    background: rgba(108, 92, 231, 0.04);
    border-radius: 0 8px 8px 0;
    color: #3a3a55;
    font-style: italic;
  }

  .markdown-body blockquote p { margin: 0.3em 0; }

  .markdown-body code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.88em;
    background: #eeecea;
    color: #d63384;
    padding: 2px 6px;
    border-radius: 4px;
  }

  .markdown-body .code-block-wrapper {
    margin: 1em 0;
    border-radius: 10px;
    overflow: hidden;
    background: #1e1e2e;
    box-shadow: 0 4px 24px rgba(0,0,0,0.18);
    position: relative;
  }

  .code-block-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: #282840;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    user-select: none;
  }

  .code-block-header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .code-block-dots {
    display: flex;
    gap: 6px;
  }

  .code-block-dots span {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    display: block;
  }

  .code-block-dots span:nth-child(1) { background: #ff5f57; }
  .code-block-dots span:nth-child(2) { background: #febc2e; }
  .code-block-dots span:nth-child(3) { background: #28c840; }

  .code-block-lang {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #888aaa;
    letter-spacing: 0.5px;
    text-transform: lowercase;
  }

  .code-block-header-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .code-copy-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.1);
    color: #888aaa;
    padding: 4px 10px;
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .code-copy-btn:hover {
    background: rgba(255,255,255,0.08);
    color: #c8c8d8;
    border-color: rgba(255,255,255,0.2);
  }

  .code-copy-btn.copied {
    color: #28c840;
    border-color: rgba(40, 200, 64, 0.3);
  }

  .code-copy-btn svg {
    width: 14px;
    height: 14px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .code-block-collapse-btn {
    display: flex;
    align-items: center;
    background: transparent;
    border: none;
    color: #888aaa;
    cursor: pointer;
    padding: 2px;
    border-radius: 4px;
    transition: all 0.2s;
  }

  .code-block-collapse-btn:hover {
    color: #c8c8d8;
    background: rgba(255,255,255,0.08);
  }

  .code-block-collapse-btn svg {
    width: 16px;
    height: 16px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    transition: transform 0.2s;
  }

  .code-block-wrapper.collapsed .code-block-collapse-btn svg {
    transform: rotate(-90deg);
  }

  .code-block-wrapper.collapsed pre {
    display: none;
  }

  .markdown-body pre {
    margin: 0;
    border-radius: 0;
    overflow: hidden;
    background: #1e1e2e;
  }

  .markdown-body pre code {
    display: block;
    padding: 20px;
    background: transparent;
    color: #c8c8d8;
    font-size: 13px;
    line-height: 1.7;
    overflow-x: auto;
    border-radius: 0;
  }

  .markdown-body ul, .markdown-body ol {
    margin: 0.8em 0;
    padding-left: 1.8em;
  }

  .markdown-body li {
    margin: 0.3em 0;
  }

  .markdown-body li::marker {
    color: var(--accent);
  }

  .markdown-body hr {
    border: none;
    height: 2px;
    background: linear-gradient(90deg, transparent, #d0cfc8, transparent);
    margin: 2em 0;
  }

  .markdown-body img {
    max-width: 100%;
    border-radius: 10px;
    margin: 1em 0;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  }

  .markdown-body table {
    width: 100%;
    border-collapse: collapse;
    margin: 1em 0;
    font-size: 14px;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }

  .markdown-body th {
    background: #1a1a2e;
    color: #fff;
    font-weight: 600;
    padding: 12px 16px;
    text-align: left;
  }

  .markdown-body td {
    padding: 10px 16px;
    border-bottom: 1px solid #e8e6e0;
  }

  .markdown-body tr:nth-child(even) td {
    background: rgba(0,0,0,0.015);
  }

  .markdown-body input[type="checkbox"] {
    accent-color: var(--accent);
    margin-right: 6px;
    transform: scale(1.1);
  }

  .markdown-body del {
    color: #999;
  }

  /* ─── STATUS BAR ─── */
  .status-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 24px;
    background: var(--bg-deep);
    border-top: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    flex-shrink: 0;
  }

  .status-left, .status-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    background: var(--green);
    border-radius: 50%;
    display: inline-block;
    margin-right: 6px;
    box-shadow: 0 0 6px rgba(0, 210, 160, 0.5);
    animation: pulse 2s ease infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 768px) {
    .main { flex-direction: column; }
    .resize-handle { display: none; }
    .editor-panel, .preview-panel { flex: none; height: 50%; }
    .preview-content { padding: 20px; }
    .toolbar { padding: 6px 12px; }
    .header { padding: 10px 16px; }
  }

  /* ─── VIEW MODES ─── */

  /* ─── DROP OVERLAY ─── */
  .drop-overlay {
    position: absolute;
    inset: 0;
    background: rgba(108, 92, 231, 0.12);
    backdrop-filter: blur(4px);
    border: 2px dashed var(--accent);
    border-radius: 8px;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 50;
    margin: 8px;
  }

  .drop-overlay.active {
    display: flex;
  }

  .drop-overlay-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    color: var(--accent);
    animation: dropBounce 0.3s ease;
  }

  .drop-overlay-content svg {
    opacity: 0.8;
  }

  .drop-overlay-content span {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.5px;
  }

  @keyframes dropBounce {
    0% { transform: scale(0.9); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* ─── FILE NAME BADGE ─── */
  .file-badge {
    display: none;
    align-items: center;
    gap: 6px;
    background: rgba(108, 92, 231, 0.15);
    border: 1px solid rgba(108, 92, 231, 0.3);
    color: var(--accent);
    padding: 4px 10px;
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    max-width: 180px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .file-badge.active {
    display: flex;
  }

  .file-badge svg {
    width: 12px;
    height: 12px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
    flex-shrink: 0;
  }

  /* ─── VIEW MODES (cont.) ─── */

  /* ─── HISTORY PANEL ─── */
  .history-panel {
    width: 0;
    min-width: 0;
    overflow: hidden;
    background: var(--bg-editor);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    transition: width 0.25s ease, min-width 0.25s ease;
    flex-shrink: 0;
  }

  .history-panel.open {
    width: 300px;
    min-width: 300px;
  }

  .history-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .history-title {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    color: #fff;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  .history-close-btn {
    background: transparent;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 4px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    transition: all 0.15s;
  }

  .history-close-btn:hover {
    color: #fff;
    background: rgba(255,255,255,0.08);
  }

  .history-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .history-list::-webkit-scrollbar { width: 4px; }
  .history-list::-webkit-scrollbar-track { background: transparent; }
  .history-list::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 2px; }

  .history-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 40px 16px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-align: center;
  }

  .history-item {
    padding: 12px 14px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: 4px;
    border: 1px solid transparent;
    position: relative;
  }

  .history-item:hover {
    background: rgba(108, 92, 231, 0.08);
    border-color: var(--border);
  }

  .history-item-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    color: #ddd;
    margin-bottom: 4px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    padding-right: 24px;
  }

  .history-item-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
  }

  .history-item-size {
    background: rgba(108, 92, 231, 0.15);
    color: var(--accent);
    padding: 1px 6px;
    border-radius: 3px;
  }

  .history-item-delete {
    position: absolute;
    top: 10px;
    right: 10px;
    background: transparent;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 2px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    opacity: 0;
    transition: all 0.15s;
  }

  .history-item:hover .history-item-delete {
    opacity: 1;
  }

  .history-item-delete:hover {
    color: #ff5f57;
    background: rgba(255, 95, 87, 0.1);
  }

  .history-item-delete svg {
    width: 12px;
    height: 12px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
  }

  @media (max-width: 768px) {
    .history-panel.open {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      z-index: 200;
      width: 280px;
      min-width: 280px;
      box-shadow: -4px 0 24px rgba(0,0,0,0.4);
    }
  }
  .main.editor-only .preview-panel,
  .main.editor-only .resize-handle { display: none; }
  .main.preview-only .editor-panel,
  .main.preview-only .resize-handle { display: none; }

  /* ─── Fullscreen animation ─── */
  .main { transition: all 0.3s ease; }

  /* Tooltip */
  .tool-btn[data-tooltip]:hover::before {
    content: attr(data-tooltip);
    position: absolute;

    transform: translateX(-50%);

  }
</style>

<script>
const editor = document.getElementById('editor');
const preview = document.getElementById('preview');
const mainArea = document.getElementById('mainArea');
let currentFileName = '';

// ── Marked.js config ──
marked.setOptions({
  highlight: function(code, lang) {
    if (lang && hljs.getLanguage(lang)) {
      return hljs.highlight(code, { language: lang }).value;
    }
    return hljs.highlightAuto(code).value;
  },
  breaks: true,
  gfm: true
});

// ── Default content ──
const defaultContent = `# 🎨 MDCRAFT 마크다운 에디터에 오신 것을 환영합니다

실시간으로 마크다운을 편집하고 즉시 미리보기를 확인하세요.

## ✨ 주요 기능

**굵은 텍스트**, *기울임 텍스트*, ~~취소선~~, 그리고 \`인라인 코드\`를 지원합니다.

### 코드 블록

\`\`\`javascript
function greeting(name) {
  const message = \`안녕하세요, \${name}님!\`;
  console.log(message);
  return message;
}

greeting("세계");
\`\`\`

\`\`\`python
def fibonacci(n):
    a, b = 0, 1
    for _ in range(n):
        yield a
        a, b = b, a + b

list(fibonacci(10))
\`\`\`

### 인용문

> 코드는 사람이 읽기 위해 작성하는 것이고,
> 기계가 실행하는 것은 부수적인 효과에 불과하다.
>
> — Harold Abelson

### 목록

- 📝 실시간 미리보기
- 🎨 아름다운 렌더링
- 💾 파일 다운로드
- ⌨️ 단축키 지원

### 체크리스트

- [x] 마크다운 파서 구현
- [x] 실시간 미리보기
- [x] 코드 하이라이팅
- [ ] 다크/라이트 테마 전환

### 테이블

| 기능 | 상태 | 비고 |
|------|------|------|
| 실시간 미리보기 | ✅ 완료 | GFM 지원 |
| 코드 하이라이팅 | ✅ 완료 | highlight.js |
| 파일 저장 | ✅ 완료 | .md 다운로드 |
| 도구 모음 | ✅ 완료 | 원클릭 삽입 |

### 수평선

---

> 지금 바로 왼쪽 편집기에서 마크다운을 작성해보세요! 🚀
`;

editor.value = defaultContent;

// ── Render ──
let renderTimeout;
function render() {
  clearTimeout(renderTimeout);
  renderTimeout = setTimeout(() => {
    preview.innerHTML = marked.parse(editor.value);
    wrapCodeBlocks();
    updateStats();
  }, 80);
}

// ── 코드블록 macOS 헤더 래핑 ──
function wrapCodeBlocks() {
  const pres = preview.querySelectorAll('pre');
  pres.forEach((pre, idx) => {
    if (pre.parentElement.classList.contains('code-block-wrapper')) return;

    const code = pre.querySelector('code');
    let lang = '';
    if (code) {
      const cls = Array.from(code.classList).find(c => c.startsWith('language-'));
      if (cls) lang = cls.replace('language-', '');
    }

    const wrapper = document.createElement('div');
    wrapper.className = 'code-block-wrapper';

    const header = document.createElement('div');
    header.className = 'code-block-header';
    header.innerHTML = `
      <div class="code-block-header-left">
        <div class="code-block-dots"><span></span><span></span><span></span></div>
      </div>
      <div class="code-block-header-right">
        ${lang ? `<span class="code-block-lang">${lang}</span>` : ''}
        <button class="code-copy-btn" data-idx="${idx}" onclick="copyCodeBlock(this)">
          <svg class="copy-icon" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          <svg class="check-icon" viewBox="0 0 24 24" style="display:none"><polyline points="20 6 9 17 4 12"/></svg>
          <span>Copy</span>
        </button>
        <button class="code-block-collapse-btn" onclick="toggleCodeCollapse(this)">
          <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
      </div>
    `;

    pre.parentNode.insertBefore(wrapper, pre);
    wrapper.appendChild(header);
    wrapper.appendChild(pre);
  });
}

// ── Copy 버튼 동작 ──
function copyCodeBlock(btn) {
  const wrapper = btn.closest('.code-block-wrapper');
  const code = wrapper.querySelector('pre code');
  if (!code) return;

  navigator.clipboard.writeText(code.textContent).then(() => {
    const copyIcon = btn.querySelector('.copy-icon');
    const checkIcon = btn.querySelector('.check-icon');
    const label = btn.querySelector('span');

    btn.classList.add('copied');
    copyIcon.style.display = 'none';
    checkIcon.style.display = 'block';
    label.textContent = 'Copied!';

    setTimeout(() => {
      btn.classList.remove('copied');
      copyIcon.style.display = 'block';
      checkIcon.style.display = 'none';
      label.textContent = 'Copy';
    }, 2000);
  });
}

// ── 코드블록 접기/펼치기 ──
function toggleCodeCollapse(btn) {
  const wrapper = btn.closest('.code-block-wrapper');
  wrapper.classList.toggle('collapsed');
}

function updateStats() {
  const text = editor.value;
  const chars = text.length;
  const words = text.trim() ? text.trim().split(/\s+/).length : 0;
  const lines = text.split('\n').length;
  document.getElementById('wordCount').textContent = `${chars} 글자 · ${words} 단어 · ${lines} 줄`;
}

function updateCursorPos() {
  const pos = editor.selectionStart;
  const text = editor.value.substring(0, pos);
  const line = text.split('\n').length;
  const col = pos - text.lastIndexOf('\n');
  document.getElementById('cursorPos').textContent = `줄 ${line}, 열 ${col}`;
}

editor.addEventListener('input', render);
editor.addEventListener('click', updateCursorPos);
editor.addEventListener('keyup', updateCursorPos);

// ── Tab key support ──
editor.addEventListener('keydown', function(e) {
  if (e.key === 'Tab') {
    e.preventDefault();
    const start = this.selectionStart;
    const end = this.selectionEnd;
    this.value = this.value.substring(0, start) + '  ' + this.value.substring(end);
    this.selectionStart = this.selectionEnd = start + 2;
    render();
  }
});

// ── Keyboard shortcuts ──
document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 'b') { e.preventDefault(); wrapText('**', '**'); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'i') { e.preventDefault(); wrapText('*', '*'); }
  if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); downloadMarkdown(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); insertLink(); }
});

// ── Toolbar functions ──
function insertText(before, after) {
  const start = editor.selectionStart;
  const end = editor.selectionEnd;
  const selected = editor.value.substring(start, end);
  const newText = before + selected + after;
  editor.value = editor.value.substring(0, start) + newText + editor.value.substring(end);
  editor.selectionStart = start + before.length;
  editor.selectionEnd = start + before.length + selected.length;
  editor.focus();
  render();
}

function wrapText(before, after) {
  const start = editor.selectionStart;
  const end = editor.selectionEnd;
  const selected = editor.value.substring(start, end) || '텍스트';
  const newText = before + selected + after;
  editor.value = editor.value.substring(0, start) + newText + editor.value.substring(end);
  editor.selectionStart = start + before.length;
  editor.selectionEnd = start + before.length + selected.length;
  editor.focus();
  render();
}

function insertLink() {
  const url = 'https://example.com';
  const text = editor.value.substring(editor.selectionStart, editor.selectionEnd) || '링크 텍스트';
  insertText('[' + text + '](', url + ')');
}

function insertImage() {
  const url = 'https://example.com/image.png';
  insertText('![대체 텍스트](', url + ')');
}

function insertTable() {
  const table = '\n| 제목 1 | 제목 2 | 제목 3 |\n|--------|--------|--------|\n| 내용 1 | 내용 2 | 내용 3 |\n| 내용 4 | 내용 5 | 내용 6 |\n';
  insertText(table, '');
}

// ── View switching ──
function switchView(mode) {
  mainArea.className = 'main';
  if (mode !== 'split') mainArea.classList.add(mode);
  document.querySelectorAll('.header-btn').forEach(b => b.style.borderColor = '');
  const btnMap = { split: 'btn-split', 'editor-only': 'btn-editor', 'preview-only': 'btn-preview' };
  document.getElementById(btnMap[mode]).style.borderColor = 'var(--accent)';
}

// ── Download ──
function downloadMarkdown() {
  const blob = new Blob([editor.value], { type: 'text/markdown' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = currentFileName || 'document.md';
  a.click();
  URL.revokeObjectURL(a.href);
}

// ── PDF Download (벡터 기반, 선명) ──
function downloadPDF() {
  const btn = document.getElementById('pdfBtn');
  const origText = btn.innerHTML;
  btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="spin-icon"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> 변환 중...`;
  btn.style.pointerEvents = 'none';

  const source = document.getElementById('preview');
  const content = source.innerHTML;

  // 새 창에서 인쇄 (벡터 렌더링 → 선명한 PDF)
  const printWindow = window.open('', '_blank', 'width=800,height=600');
  printWindow.document.write(`<!DOCTYPE html>
<html>

// ── Resize handle ──
const resizeHandle = document.getElementById('resizeHandle');
const editorPanel = document.getElementById('editorPanel');
const previewPanel = document.getElementById('previewPanel');
let isResizing = false;

resizeHandle.addEventListener('mousedown', (e) => {
  isResizing = true;
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
});

document.addEventListener('mousemove', (e) => {
  if (!isResizing) return;
  const containerRect = mainArea.getBoundingClientRect();
  const ratio = (e.clientX - containerRect.left) / containerRect.width;
  const clamped = Math.max(0.2, Math.min(0.8, ratio));
  editorPanel.style.flex = `0 0 ${clamped * 100}%`;
  previewPanel.style.flex = `0 0 ${(1 - clamped) * 100}%`;
});

document.addEventListener('mouseup', () => {
  if (isResizing) {
    isResizing = false;
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  }
});

// ── Initial render ──

// ── 파일 업로드 처리 ──

function handleFileUpload(event) {
  const file = event.target.files[0];
  if (file) loadFile(file);
  event.target.value = '';
}

function loadFile(file) {
  if (!file.name.match(/\.(md|markdown|txt)$/i)) {
    alert('.md, .markdown, .txt 파일만 업로드할 수 있습니다.');
    return;
  }

  const reader = new FileReader();
  reader.onload = function(e) {
    editor.value = e.target.result;
    currentFileName = file.name;
    render();

    // 파일명 뱃지 표시
    document.getElementById('fileName').textContent = file.name;
    document.getElementById('fileBadge').classList.add('active');
  };
  reader.readAsText(file);
}

// ── 드래그 앤 드롭 ──
const dropOverlay = document.getElementById('dropOverlay');
let dragCounter = 0;

document.addEventListener('dragenter', (e) => {
  e.preventDefault();
  dragCounter++;
  if (dragCounter === 1) {
    dropOverlay.classList.add('active');
  }
});

document.addEventListener('dragleave', (e) => {
  e.preventDefault();
  dragCounter--;
  if (dragCounter === 0) {
    dropOverlay.classList.remove('active');
  }
});

document.addEventListener('dragover', (e) => {
  e.preventDefault();
});

document.addEventListener('drop', (e) => {
  e.preventDefault();
  dragCounter = 0;
  dropOverlay.classList.remove('active');

  const files = e.dataTransfer.files;
  if (files.length > 0) {
    loadFile(files[0]);
  }
});

// ── 저장 이력 관리 ──
const HISTORY_KEY = 'mdcraft-history';

function getHistory() {
  try {
    const data = localStorage.getItem(HISTORY_KEY);
    return data ? JSON.parse(data) : [];
  } catch { return []; }
}

function saveHistory(list) {
  try {
    localStorage.setItem(HISTORY_KEY, JSON.stringify(list));
  } catch(e) {
    console.warn('이력 저장 실패:', e);
  }
}

function addToHistory() {
  const content = editor.value;
  if (!content.trim()) return;

  const history = getHistory();
  const name = currentFileName || 'untitled.md';
  const now = new Date();

  const entry = {
    id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
    name: name,
    content: content,
    size: new Blob([content]).size,
    date: now.toISOString(),
    preview: content.replace(/[#*`~>\-\[\]|]/g, '').trim().substring(0, 80)
  };

  // 최대 30개까지 유지
  history.unshift(entry);
  if (history.length > 30) history.length = 30;

  saveHistory(history);
  renderHistoryList();
}

function formatFileSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

function formatDate(isoStr) {
  const d = new Date(isoStr);
  const now = new Date();
  const diff = now - d;

  if (diff < 60000) return '방금 전';
  if (diff < 3600000) return Math.floor(diff / 60000) + '분 전';
  if (diff < 86400000) return Math.floor(diff / 3600000) + '시간 전';
  if (diff < 604800000) return Math.floor(diff / 86400000) + '일 전';

  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  const h = String(d.getHours()).padStart(2, '0');
  const min = String(d.getMinutes()).padStart(2, '0');
  return `${y}.${m}.${day} ${h}:${min}`;
}

function renderHistoryList() {
  const list = document.getElementById('historyList');
  const history = getHistory();
  const empty = document.getElementById('historyEmpty');

  // 기존 아이템 제거 (empty 메시지 유지)
  list.querySelectorAll('.history-item').forEach(el => el.remove());

  if (history.length === 0) {
    if (empty) empty.style.display = 'flex';
    return;
  }

  if (empty) empty.style.display = 'none';

  history.forEach(entry => {
    const item = document.createElement('div');
    item.className = 'history-item';
    item.onclick = () => loadFromHistory(entry.id);
    item.innerHTML = `
      <div class="history-item-name">${escapeHtml(entry.name)}</div>
      <div class="history-item-meta">
        <span>${formatDate(entry.date)}</span>
        <span class="history-item-size">${formatFileSize(entry.size)}</span>
      </div>
      ${entry.preview ? `<div style="font-size:10px;color:#555577;margin-top:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:'JetBrains Mono',monospace;">${escapeHtml(entry.preview)}</div>` : ''}
      <button class="history-item-delete" onclick="event.stopPropagation();deleteFromHistory('${entry.id}')">
        <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
      </button>
    `;
    list.appendChild(item);
  });
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function loadFromHistory(id) {
  const history = getHistory();
  const entry = history.find(h => h.id === id);
  if (!entry) return;

  if (editor.value.trim() && editor.value !== entry.content) {
    if (!confirm('현재 작성 중인 내용이 있습니다. 이력을 불러오시겠습니까?')) return;
  }

  editor.value = entry.content;
  currentFileName = entry.name;
  render();

  document.getElementById('fileName').textContent = entry.name;
  document.getElementById('fileBadge').classList.add('active');
}

function deleteFromHistory(id) {
  if (!confirm('이 이력을 삭제하시겠습니까?')) return;

  const history = getHistory().filter(h => h.id !== id);
  saveHistory(history);
  renderHistoryList();
}

function toggleHistory() {
  const panel = document.getElementById('historyPanel');
  panel.classList.toggle('open');
  const btn = document.getElementById('btn-history');
  if (panel.classList.contains('open')) {
    btn.style.borderColor = 'var(--accent)';
    renderHistoryList();
  } else {
    btn.style.borderColor = '';
  }
}
